schema_version: 1

context:
  pkgname: gnuplot
  version: 6.0.4

package:
  name: ${{ pkgname }}
  version: ${{ version }}

source:
  url: https://sourceforge.net/projects/${{ pkgname }}/files/${{ pkgname }}/${{ version }}/${{ pkgname }}-${{ version }}.tar.gz
  sha256: 458d94769625e73d5f6232500f49cbadcb2b183380d43d2266a0f9701aeb9c5b
  patches:
    - if: build_platform != target_platform
      then: fix-doc-path.patch

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ compiler('cxx') }}
    - ${{ stdlib("c") }}
    - pkg-config
    - if: unix
      then: gnuconfig
    - if: unix
      then: make
    - if: linux
      then: libiconv
  host:
    - readline
    - libgd
    - cairo
    - zlib
    - expat
    - freetype
    - pango
    - if: not ppc64le
      then: qt-main
    - glib
    - if: linux
      then: xorg-libx11
    - if: linux
      then: xorg-libxdamage
    - if: linux
      then: xorg-libxfixes
    - if: linux
      then: xorg-libxxf86vm
    - if: linux
      then: chrpath
    - if: linux
      then: gtk2
    - if: linux
      then: libiconv
    - if: linux
      then: libgl-devel

tests:
  - files:
      recipe:
        - test-data.txt
    script:
      - gnuplot -e "set terminal dumb; set style histogram; p 'test-data.txt'"
      - gnuplot -e "set terminal png"
      - gnuplot -e "set terminal pdfcairo"

about:
  license: gnuplot
  license_file: Copyright
  summary: Gnuplot, plotting from command line
  homepage: https://github.com/gnuplot/gnuplot

extra:
  recipe-maintainers:
    - croth1

