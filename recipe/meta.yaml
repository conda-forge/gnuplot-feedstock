{% set pkgname = "gnuplot" %}
{% set version = "6.0.4" %}

package:
  name: {{ pkgname }}
  version: {{ version }}

source:
  url: https://sourceforge.net/projects/{{ pkgname }}/files/{{ pkgname }}/{{ version }}/{{ pkgname }}-{{ version }}.tar.gz
  sha256: 458d94769625e73d5f6232500f49cbadcb2b183380d43d2266a0f9701aeb9c5b
  patches:
    - fix-doc-path.patch  # [build_platform != target_platform]

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}

    - pkg-config
    - gnuconfig  # [unix]
    - make  # [unix]
    - libiconv  # [linux]

  host:
    - readline
    - libgd
    - cairo
    - zlib
    - expat
    - freetype
    - pango
    - qt-main  # [not ppc64le]
    - glib

    - xorg-libx11  # [linux]
    - xorg-libxdamage  # [linux]
    - xorg-libxfixes  # [linux]
    - xorg-libxxf86vm  # [linux]

    - chrpath  # [linux]
    - gtk2  # [linux]
    - libiconv  # [linux]
    - libgl-devel  # [linux]

test:
  files:
    - test-data.txt
  commands:
    - gnuplot -e "set terminal dumb; set style histogram; p 'test-data.txt'"
    - gnuplot -e "set terminal png"
    - gnuplot -e "set terminal pdfcairo"

about:
  home: https://github.com/gnuplot/gnuplot
  license: Gnuplot
  license_file: Copyright
  summary: Gnuplot, plotting from command line

extra:
  recipe-maintainers:
    - croth1
